- name: Create directory for node & docker exporter
  file:
    path: "{{ node_docker_dir }}"
    state: directory
    mode: '0755'

- name: Copy deployment file
  copy:
    src: docker-compose.yml
    dest: "{{ node_docker_dir }}/docker-compose.yml"
  notify: restart stack

- name: Start node & docker exporter
  community.docker.docker_compose_v2:
    project_src: "{{ node_docker_dir }}"
    state: present
  register: node_docker_up

- name: Check if UFW service is active
  command: systemctl is-active ufw
  register: ufw_is_active
  changed_when: false
  failed_when: false

- name: Allow Prometheus server to access exporter ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    from_ip: "{{ prometheus_server_ip }}"
  loop:
    - "2100"
    - "2083"
  notify: reload ufw
  when: ufw_is_active.stdout == "active"

- name: Check if iptables is available
  command: iptables -L
  register: iptables_check
  changed_when: false
  failed_when: false

- name: Allow Prometheus server via iptables
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    source: "{{ prometheus_server_ip }}"
    destination_port: "{{ item }}"
    jump: ACCEPT
  loop:
    - "2100"
    - "2083"
  when: iptables_check.rc == 0