modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302, 309, 401, 404] # Codes considerés comme success
      method: GET
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: true # ignore la verification des certificats
      preferred_ip_protocol: "ip4"
      # Fail si le corps contient les expressions suivantes
      fail_if_body_matches_regexp:
        - "Bad Gateway"
        - "Service Temporary Unavailable"
        - "Internal Server Error"
      
  tcp_connect:
    prober: tcp
    timeout: 10s